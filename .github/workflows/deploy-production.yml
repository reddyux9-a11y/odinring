name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # Testing Phase
  # ===========================================================================
  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run backend tests
        working-directory: ./backend
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENV: test
        run: |
          pytest -v --cov=. --cov-report=term --cov-report=xml || true
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps
      
      - name: Run frontend tests
        working-directory: ./frontend
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests || true
      
      - name: Build frontend
        working-directory: ./frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
        run: npm run build

  # ===========================================================================
  # Frontend Deployment (Vercel)
  # ===========================================================================
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ secrets.VERCEL_PROJECT_DOMAIN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
      
      - name: Deployment URL
        run: |
          echo "✅ Frontend deployed to: ${{ steps.vercel-deploy.outputs.preview-url }}"

  # ===========================================================================
  # Backend Deployment (Vercel)
  # ===========================================================================
  deploy-backend:
    name: Deploy Backend to Vercel
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel-backend-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          working-directory: ./backend
          vercel-args: '--prod'
      
      - name: Deployment URL
        run: |
          echo "✅ Backend deployed to: ${{ steps.vercel-backend-deploy.outputs.preview-url }}"
          echo "Backend URL: ${{ steps.vercel-backend-deploy.outputs.preview-url }}"

  # ===========================================================================
  # Firestore Indexes Deployment
  # ===========================================================================
  deploy-indexes:
    name: Deploy Firestore Indexes
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Authenticate Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "$FIREBASE_TOKEN" | firebase login:ci --token-stdin
      
      - name: Deploy Firestore indexes
        run: |
          firebase deploy --only firestore:indexes \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive
      
      - name: Deploy Firestore rules
        run: |
          firebase deploy --only firestore:rules \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive

  # ===========================================================================
  # Health Checks
  # ===========================================================================
  health-check:
    name: Post-Deployment Health Checks
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check backend health
        run: |
          sleep 30  # Wait for deployment to stabilize
          # Try to get backend URL from secrets, fallback to constructed URL
          BACKEND_URL="${{ secrets.REACT_APP_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            # Construct backend URL from project ID if not set
            BACKEND_URL="https://${{ secrets.VERCEL_BACKEND_PROJECT_ID }}.vercel.app"
          fi
          if curl -f "$BACKEND_URL/api/status"; then
            echo "✅ Backend health check passed"
          else
            echo "⚠️ Backend health check failed"
            exit 1
          fi
        continue-on-error: true
      
      - name: Check frontend
        run: |
          FRONTEND_URL="https://${{ secrets.VERCEL_PROJECT_DOMAIN }}"
          if curl -f "$FRONTEND_URL"; then
            echo "✅ Frontend health check passed"
          else
            echo "⚠️ Frontend health check failed"
            exit 1
          fi
        continue-on-error: true

  # ===========================================================================
  # Deployment Summary
  # ===========================================================================
  notify:
    name: Deployment Summary
    needs: [deploy-frontend, deploy-backend, deploy-indexes, health-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Vercel) | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firestore Indexes | ${{ needs.deploy-indexes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Checks | ${{ needs.health-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** https://${{ secrets.VERCEL_PROJECT_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** ${{ secrets.REACT_APP_BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Send notification
        run: |
          if [ "${{ needs.deploy-frontend.result }}" == "success" ] && \
             [ "${{ needs.deploy-backend.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment had issues - check logs"
            exit 1
          fi

# =============================================================================
# Required GitHub Secrets
# =============================================================================
# Configure these in: Settings → Secrets and variables → Actions
#
# Frontend (Vercel):
#   - VERCEL_TOKEN: Get from Vercel → Settings → Tokens
#   - VERCEL_ORG_ID: Get from Vercel → Settings → General
#   - VERCEL_FRONTEND_PROJECT_ID: Get from Vercel project settings
#   - VERCEL_PROJECT_DOMAIN: Your Vercel project domain (e.g., odinring.vercel.app)
#
# Backend (Vercel):
#   - VERCEL_BACKEND_PROJECT_ID: Get from Vercel backend project settings
#
# Firebase:
#   - FIREBASE_TOKEN: Get via `firebase login:ci`
#   - FIREBASE_PROJECT_ID: Your Firebase project ID
#
# Application:
#   - JWT_SECRET: Your JWT secret key
#   - REACT_APP_BACKEND_URL: Backend API URL
#   - REACT_APP_FIREBASE_*: All Firebase configuration variables
# =============================================================================
