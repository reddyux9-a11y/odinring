name: Security Scan

on:
  schedule:
    # Run weekly security scan on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  dependency-check:
    name: Check Dependencies for Vulnerabilities
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # SECURITY: Check Python dependencies for vulnerabilities
      - name: Check Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit
          # Run safety check
          safety check --file=requirements.txt --continue-on-error || true
          # Run pip-audit (more comprehensive)
          pip-audit --requirement requirements.txt --continue-on-error || true
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      
      # SECURITY: Check npm dependencies for vulnerabilities
      - name: Check npm dependencies
        working-directory: ./frontend
        run: |
          yarn install --frozen-lockfile
          # SECURITY: Run npm audit in production mode
          yarn audit --level moderate --production || true
          # Verify lockfile is present and up to date
          if [ ! -f yarn.lock ]; then
            echo "ERROR: yarn.lock file missing - lockfile required for supply chain security"
            exit 1
          fi

  code-quality:
    name: Code Quality Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=odinring
            -Dsonar.organization=odinring
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/*.test.js,**/*.spec.js

  # SECURITY: Docker image scanning
  docker-scan:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # SECURITY: Scan backend Dockerfile
      - name: Scan backend Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results-backend.sarif'
          severity: 'CRITICAL,HIGH'
      
      # SECURITY: Scan frontend Dockerfile
      - name: Scan frontend Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL,HIGH'
      
      # SECURITY: Upload scan results
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results-backend.sarif'

  # SECURITY: Lockfile verification
  lockfile-check:
    name: Verify Lockfiles
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Python lockfile
        working-directory: ./backend
        run: |
          # SECURITY: Check if requirements.txt has pinned versions
          if ! grep -q "==" requirements.txt; then
            echo "WARNING: requirements.txt should pin versions (use == instead of >=)"
          fi
          echo "✅ Python dependencies check passed"
      
      - name: Verify npm lockfile
        working-directory: ./frontend
        run: |
          # SECURITY: Verify yarn.lock exists
          if [ ! -f yarn.lock ]; then
            echo "ERROR: yarn.lock file missing"
            exit 1
          fi
          echo "✅ npm lockfile check passed"


