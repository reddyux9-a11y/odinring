[pytest]
# Pytest configuration for OdinRing backend tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 7.4

# Add options
addopts = 
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Coverage options
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Coverage config
    --cov-config=.coveragerc
    # Strict markers
    --strict-markers
    # Warnings
    -W ignore::UserWarning
    -W ignore::DeprecationWarning
    # Show slowest tests
    --durations=10
    # Parallel execution (optional, uncomment if needed)
    # -n auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow tests
    auth: Authentication tests
    session: Session management tests
    token: Token management tests
    audit: Audit logging tests
    identity: Identity resolution tests
    security: Security-related tests
    nfc: NFC-related tests
    privacy: Privacy/GDPR tests
    phase1: Phase 1 features
    phase2: Phase 2 features
    requires_firebase: Tests requiring Firebase connection (skip in unit tests)
    pattern: Pattern-based tests (CRUD, auth, validation patterns)
    adversarial: Adversarial tests (security, edge cases, malicious inputs)
    crud: CRUD operation pattern tests
    validation: Input validation pattern tests
    error_handling: Error handling pattern tests
    edge_cases: Edge case tests (boundary conditions, unusual inputs)

# Asyncio configuration
asyncio_mode = auto

# Console output
console_output_style = progress

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# Environment variables for testing
env =
    FIREBASE_PROJECT_ID=test-project
    JWT_SECRET=test-secret-key-minimum-32-characters-long-for-testing-purposes
    ENV=test
    NFC_SECRET_KEY=test-nfc-secret-key-for-testing


